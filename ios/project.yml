# XcodeGen specification for CloudVision Mobile (iOS).
#
# Regenerate the Xcode project:    xcodegen generate
# Open it:                         open CloudVisionMobile.xcodeproj
# Build from CLI:                  xcodebuild -scheme CloudVisionMobile -destination 'generic/platform=iOS Simulator'
#
# Install XcodeGen if missing:     brew install xcodegen
#
# Why XcodeGen: the .xcodeproj is regenerable from this single YAML, so the
# canonical project definition lives in source control as human- and AI-readable
# text. The generated .xcodeproj is gitignored (see .gitignore).

name: CloudVisionMobile

options:
  bundleIdPrefix: com.gullickson
  deploymentTarget:
    iOS: "17.0"   # ContentUnavailableView et al. require iOS 17+. Bumped from 16.0 (still supports any iPhone capable of running modern Arista tooling).
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_BITCODE: NO
    # SWIFT_STRICT_CONCURRENCY: minimal  # default. Bump to `targeted` after F2 lands.

packages:
  # gRPC client (used by F2 via cloudvision.Connector RouterV1)
  # TODO Sprint-1: verify latest stable version. v1.x is the production line; v2 is preview.
  GRPC:
    url: https://github.com/grpc/grpc-swift
    from: "1.21.0"

  # Protobuf runtime (used by gRPC and by generated Connector stubs)
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf
    from: "1.25.0"

  # MessagePack with ExtType support (used by NEAT codec — see PRD §7 R9)
  # TODO Sprint-1: confirm a2/MessagePack.swift's tagged release supports ExtType encoding/decoding.
  # Alternative if needed: hirotakan/MessagePacker.
  MessagePack:
    url: https://github.com/a2/MessagePack.swift
    from: "4.0.0"

targets:
  CloudVisionMobile:
    type: application
    platform: iOS
    sources:
      - path: CloudVisionMobile
        excludes:
          # Per-directory navigation docs for AI agents; never copy into the app bundle
          # (XcodeGen flattens equal filenames in resource copies → duplicate-output error).
          - "**/CLAUDE.md"
          - "**/README.md"
    # Info.plist is declared explicitly (not auto-generated) so we can write the UILaunchScreen
    # dict — the launch-screen color-asset binding does not have a working INFOPLIST_KEY_*
    # equivalent in this Xcode toolchain.
    info:
      path: CloudVisionMobile/Info.plist
      properties:
        # Home-screen label. Trimmed from "CloudVision Mobile" → "CloudVision" — the icon
        # already carries the visual brand; the label just needs to match how Arista refers
        # to the product internally.
        CFBundleDisplayName: CloudVision
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"   # iPhone only
        PRODUCT_BUNDLE_IDENTIFIER: com.gullickson.CloudVisionMobile
        # Apply the AccentColor asset (#16315A) as the global tint. Belt-and-suspenders with
        # Appearance.apply() at app launch — covers anywhere UIKit reads the asset directly.
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # DEVELOPMENT_TEAM: ""   # Eric: set to your Apple Developer Team ID for device builds
    dependencies:
      - package: GRPC
        product: GRPC
      - package: SwiftProtobuf
        product: SwiftProtobuf
      - package: MessagePack
        product: MessagePack
